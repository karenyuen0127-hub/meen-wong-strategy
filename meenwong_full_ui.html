
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--white:#fff;--bd:#e0ddd6;--text:#1a1a1a;--mu:#888;--fa:#bbb;
  --gr:#00a060;--grl:#eaf5f0;--grb:rgba(0,160,96,0.18);
  --bl:#1a3a5c;--bll:#e8f0f8;--blb:rgba(26,58,92,0.18);
  --or:#c97c10;--orl:#fef8ee;
  --pu:#6d28d9;--pul:#f3eeff;--pub:rgba(109,40,217,0.18);
  --re:#9b2335;--rel:#fdf0f2;
  --go:#b07800;--gol:#fffbe6;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes sIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes fUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.app{border:1px solid var(--bd);border-radius:12px;overflow:hidden;background:var(--bg)}

.modebar{background:var(--white);border-bottom:1px solid var(--bd);display:flex;gap:0;flex-shrink:0}
.mbtab{padding:10px 22px;font-size:12px;font-family:inherit;cursor:pointer;border:none;background:transparent;color:var(--mu);border-bottom:2px solid transparent;transition:all 0.15s;font-weight:500}
.mbtab.on{color:var(--text);border-bottom-color:var(--gr);background:var(--white)}

.view{display:none}
.view.on{display:flex;flex-direction:column}

.topbar{background:var(--white);border-bottom:1px solid var(--bd);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;flex-shrink:0}
.tb-brand-sub{font-size:9px;letter-spacing:3px;color:var(--mu);text-transform:uppercase}
.tb-brand{font-family:'DM Serif Display',serif;font-size:15px;color:var(--text)}
.tb-brand em{color:var(--gr);font-style:italic}
.tb-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pbar-wrap{text-align:right}
.pbar-lbl{font-size:11px;color:var(--mu);margin-bottom:3px}
.pbar-track{width:140px;height:4px;background:var(--bd);border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;background:var(--gr);border-radius:2px}
.tbtn{padding:5px 11px;border-radius:5px;font-size:11px;font-family:inherit;cursor:pointer;border:1px solid var(--bd);background:var(--white);color:var(--mu);font-weight:500}
.tbtn-gr{background:var(--gr);color:#fff;border:none;font-weight:600}
.tbtn-bl{background:var(--bl);color:#fff;border:none;font-weight:600;display:flex;align-items:center;gap:5px}
.play{width:0;height:0;border-top:4px solid transparent;border-bottom:4px solid transparent;border-left:7px solid #fff;display:inline-block}

.body{display:flex;overflow:hidden;height:520px}

.sidebar{width:272px;flex-shrink:0;border-right:1px solid var(--bd);background:var(--white);overflow-y:auto;padding:12px 8px}
.stage-hd{font-size:8px;letter-spacing:2px;text-transform:uppercase;font-weight:600;padding-left:7px;border-left:3px solid;margin-bottom:6px;margin-top:12px}
.stage-hd:first-of-type{margin-top:0}
.ag{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;border:1px solid var(--bd);margin-bottom:3px;cursor:pointer;background:var(--white);transition:all 0.12s}
.ag.done{border-color:#d4eddf;background:#f9fdf9}
.ag.active{border-color:var(--active-ac,#00a060);background:rgba(0,160,96,0.05)}
.ag-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0;border:2px solid}
.ag-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:2px}
.ag-tags{display:flex;gap:3px;flex-wrap:wrap}
.tag{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:500}
.ag-run{padding:2px 7px;border-radius:4px;border:none;font-size:9px;font-family:inherit;font-weight:600;cursor:pointer}
.sb-cta{background:linear-gradient(135deg,var(--bll),#eaf2fb);border:1px solid var(--blb);border-radius:8px;padding:12px 13px;text-align:center;margin-top:8px}
.sb-cta-lbl{font-size:8px;letter-spacing:2px;color:var(--bl);text-transform:uppercase;font-weight:700;margin-bottom:4px}
.sb-cta-body{font-size:11px;color:var(--text);margin-bottom:9px;line-height:1.45}
.sb-cta-btn{width:100%;padding:7px;background:var(--bl);color:#fff;border:none;border-radius:5px;font-size:11px;font-family:inherit;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}

.detail{flex:1;overflow-y:auto;padding:20px 24px;background:#fafaf8}
.ag-hd{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px}
.ag-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.ag-title{font-family:'DM Serif Display',serif;font-size:17px;color:var(--text);margin-bottom:3px}
.ag-sub{font-size:11px;color:var(--mu);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.output-card{background:var(--white);border:1px solid var(--bd);border-radius:8px;padding:14px 16px;margin-bottom:12px}
.output-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);font-weight:600;margin-bottom:8px}
.output-txt{font-size:12px;color:var(--text);line-height:1.85;white-space:pre-wrap;max-height:130px;overflow:hidden;position:relative}
.output-txt::after{content:'';position:absolute;bottom:0;left:0;right:0;height:32px;background:linear-gradient(transparent,#fafaf8)}
.hitl-card{background:var(--gol);border:1px solid rgba(176,120,0,0.26);border-radius:8px;padding:14px 16px;margin-bottom:10px}
.hitl-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--go);font-weight:700;margin-bottom:4px}
.hitl-q{font-size:11px;color:#555;font-style:italic;margin-bottom:9px;line-height:1.6}
.hitl-notes-lbl{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--mu);font-weight:600;margin-bottom:3px}
.hitl-ta{width:100%;padding:7px 9px;border:1px solid var(--bd);border-radius:5px;font-size:11px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--white);resize:none;line-height:1.5;outline:none}
.hitl-actions{display:flex;align-items:center;gap:8px;margin-top:7px}
.hitl-confirm{padding:5px 12px;background:var(--go);color:#fff;border:none;border-radius:5px;font-size:10px;font-family:inherit;font-weight:600;cursor:pointer;opacity:0.7}
.hitl-done{font-size:11px;color:var(--gr);font-weight:500}
.unlock-card{border:1px solid var(--blb);border-radius:10px;padding:18px 20px;text-align:center;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--bll) 0%,#eaf2fb 100%)}
.unlock-shimmer{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#00a060,#1a3a5c,#c97c10,#6d28d9,#00a060);background-size:200% 100%;animation:shimmer 2.5s linear infinite}
@keyframes shimmer{0%{background-position:0% 0}100%{background-position:200% 0}}
.unlock-title{font-size:9px;letter-spacing:2px;color:var(--bl);text-transform:uppercase;font-weight:700;margin-bottom:6px}
.unlock-body{font-size:12px;color:var(--text);margin-bottom:14px;line-height:1.55}
.unlock-btn{padding:10px 28px;background:var(--bl);color:#fff;border:none;border-radius:7px;font-size:12px;font-family:inherit;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px}

.pres-topbar{background:var(--white);border-bottom:1px solid var(--bd);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pres-rail{width:136px;border-right:1px solid var(--bd);overflow-y:auto;padding:8px 6px;background:#f0ede8;flex-shrink:0}
.pthumb{margin-bottom:4px;cursor:pointer;border-radius:5px;border:1px solid transparent;padding:6px 8px;transition:all 0.12s;background:transparent}
.pthumb:hover{background:var(--white);border-color:var(--bd)}
.pthumb.on{background:var(--white);border-color:var(--thumb-ac,#00a060)}
.pthumb-n{font-size:8px;letter-spacing:1px;text-transform:uppercase;font-weight:600;margin-bottom:2px;color:var(--mu)}
.pthumb.on .pthumb-n{color:var(--thumb-ac,#00a060)}
.pthumb-l{font-size:10px;line-height:1.3;color:var(--mu)}
.pthumb.on .pthumb-l{color:var(--text);font-weight:500}
.pres-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.pres-canvas{flex:1;display:flex;align-items:center;justify-content:center;padding:18px 28px;overflow:hidden}
.slide{width:100%;max-width:700px;border-radius:11px;border:1px solid var(--bd);background:var(--white);box-shadow:0 3px 20px rgba(0,0,0,0.07);animation:sIn 0.24s ease forwards}
.pres-notes{border-top:1px solid var(--bd);background:#fffdf8;padding:9px 28px;flex-shrink:0}
.pres-nav{background:var(--white);border-top:1px solid var(--bd);padding:7px 28px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.pnav-btn{padding:5px 13px;border-radius:5px;font-size:11px;font-family:inherit;cursor:pointer;transition:all 0.12s}
.pnav-prev{background:var(--bg);color:var(--mu);border:1px solid var(--bd)}
.pnav-next{border:none;color:#fff;font-weight:600}
</style>

<div class="app">
<div class="modebar">
  <button class="mbtab on" onclick="switchMode('chain')">Chain — all 13 agents</button>
  <button class="mbtab" onclick="switchMode('pres')">Presentation — 15 slides</button>
</div>

<div class="view on" id="chain-view">
  <div class="topbar">
    <div>
      <div class="tb-brand-sub">MGMT5410 · Group 13 — 麵王 Meen Wong</div>
      <div class="tb-brand">QSR <em>CEO Toolkit</em></div>
    </div>
    <div class="tb-right">
      <div class="pbar-wrap">
        <div class="pbar-lbl">13 / 13 agents complete</div>
        <div class="pbar-track"><div class="pbar-fill" style="width:100%"></div></div>
      </div>
      <button class="tbtn">← Profile</button>
      <button class="tbtn tbtn-gr">Re-run All</button>
      <button class="tbtn tbtn-bl" onclick="switchMode('pres')"><span class="play"></span>Present</button>
    </div>
  </div>
  <div class="body">
    <div class="sidebar" id="sidebar"></div>
    <div class="detail" id="detail"></div>
  </div>
</div>

<div class="view" id="pres-view">
  <div class="pres-topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="tbtn" onclick="switchMode('chain')">← Chain</button>
      <span style="font-size:11px;color:var(--mu)">麵王 Meen Wong · Strategy Deck · 2025</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:11px;color:var(--mu)" id="pcounter">1 / 15</span>
      <div style="width:100px;height:3px;background:var(--bd);border-radius:2px;overflow:hidden"><div id="ppbar" style="height:100%;width:7%;background:#00a060;border-radius:2px;transition:width 0.3s"></div></div>
      <button class="tbtn" id="notesToggle" onclick="toggleNotes()" style="font-size:11px">Notes</button>
    </div>
  </div>
  <div class="body">
    <div class="pres-rail" id="pres-rail"></div>
    <div class="pres-main">
      <div class="pres-canvas" id="pres-canvas"></div>
      <div class="pres-notes" id="pres-notes" style="display:none">
        <div style="font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);font-weight:600;margin-bottom:4px">Speaker notes</div>
        <div style="font-size:11px;color:#555;line-height:1.6" id="notes-txt"></div>
      </div>
      <div class="pres-nav">
        <button class="pnav-btn pnav-prev" id="pprev" onclick="pgo(-1)">← Prev</button>
        <span style="font-size:9px;color:var(--fa);letter-spacing:1.5px;text-transform:uppercase">Arrow keys to navigate</span>
        <button class="pnav-btn pnav-next" id="pnext" onclick="pgo(1)" style="background:#00a060">Next →</button>
      </div>
    </div>
  </div>
</div>
</div>

<script>
function switchMode(m){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.mbtab').forEach(b=>b.classList.remove('on'));
  document.getElementById(m+'-view').classList.add('on');
  document.querySelectorAll('.mbtab').forEach(b=>{if(b.textContent.includes(m==='chain'?'Chain':'Presentation'))b.classList.add('on');});
}

const AC={gr:'#00a060',bl:'#1a3a5c',or:'#c97c10',pu:'#6d28d9',re:'#9b2335'};

const AGENTS=[
  {id:'1.0',name:'User Company Profile Input',fw:'Structured Data Collection',ac:AC.gr,stage:'Stage 1 — Context & User Data Input',stageAc:AC.gr,
   pivotQ:'Review the completeness score. If completeness < 0.80, list every missing field and explain why each gap could corrupt downstream scoring.',
   scoreTag:'Data_Completeness_Score',
   output:`DATA_COMPLETENESS_SCORE: 0.91 | INPUT_CLARITY_SCORE: 0.88

COMPANY SNAPSHOT
麵王 Meen Wong is a 1-store Budget Cantonese noodle brand in Sham Shui Po built on a 40-year grandmother's wonton skin recipe. Daily sales of HKD 8,500 at a 9% net margin indicate lean but profitable unit economics. Expansion target: 2 new corporate-owned stores in 18 months across MTR residential corridors, funded by HKD 1.2M capital.

KEY ASSETS
• Proprietary wonton skin recipe — 40-year heritage, no MSG, genuinely inimitable in the short term
• 8-minute table turnover driven by 2-staff lean kitchen — best-in-class throughput for price segment
• 28% food cost — exceptional margin headroom vs. segment average of 34%

STRATEGIC RISKS
• Zero written SOPs — entire operation lives in owner's and senior cook's heads; replication is currently impossible
• Single-point-of-failure on senior cook — succession risk is existential for any expansion
• Zero digital presence — no brand awareness outside 300m radius of current store

DATA GAPS: No digital revenue data (harms Agent 3.2 marketing analysis). Delivery radius limitation noted.

RECOMMENDATION: Begin SOP documentation this week. Block 4 hours every Monday for kitchen video recording before any expansion decision is made.`,
   hitl:'Data completeness is 0.91 — satisfactory to proceed. Key gap flagged correctly: no digital metrics because we have none. Will use Foodpanda order data as proxy. Confirmed: SOP documentation starts Monday.'},

  {id:'1.1',name:'Industry Context Document Generation',fw:'Industry Environment Synthesis',ac:AC.gr,stage:'Stage 1 — Context & User Data Input',stageAc:AC.gr,
   pivotQ:'Does this industry context capture the most current HK QSR dynamics? Surface 2 specific points the CEO should validate before continuing.',
   scoreTag:'Relevance_Score',
   output:`RELEVANCE_SCORE: 0.86 | INSIGHT_DENSITY_SCORE: 0.79

HK QSR MARKET OVERVIEW 2025–2026
Market Size: HKD 42B, growing 4.8% YoY. Budget QSR (under HKD 80/head) accounts for 38% of segment by transaction volume.

KEY TRENDS
1. Value migration — post-inflation dining shift back toward sub-HKD 70 meals among residential estate workers
2. MTR residential retail vacancy — 6.2% vacancy in Wong Tai Sin and Kwun Tong ground floor retail (opportunity window)
3. Delivery platform consolidation — Foodpanda dominates residential estate segments (67% market share vs Deliveroo in budget QSR)
4. Octopus/FPS adoption — 97% of residential transactions are cashless; cash-only infrastructure is now a friction cost
5. HACCP enforcement tightening — FEHD increased surprise inspections by 23% in 2025; undocumented kitchens at higher risk

DISTRICT DYNAMICS
MTR residential rental index: Wong Tai Sin ground floor ~HKD 28/sqft/month vs CBD HKD 65/sqft/month — 57% discount validates budget QSR expansion thesis.

KEY UNCERTAINTIES
1. Validate the 6.2% vacancy rate with a local estate agent before signing any LOI
2. Confirm Foodpanda residential delivery share with a local F&B operator — platform data may differ from industry estimates`,
   hitl:'Confirms the MTR residential rental advantage I already suspected. The 57% discount vs CBD is the financial case for Wong Tai Sin. Will validate vacancy rate with my Kwun Tong landlord contact before proceeding. The HACCP enforcement point is alarming — I had not factored this in.'},

  {id:'2.1',name:'PESTEL Analysis (HK QSR)',fw:'PESTEL Framework',ac:AC.bl,stage:'Stage 2 — External Environmental Scan',stageAc:AC.bl,
   pivotQ:'Which 2 PESTEL factors have the highest combined impact × probability for 麵王?',
   scoreTag:'Coverage_Score',
   output:`COVERAGE_SCORE: 0.92

TOP 2 HIGHEST IMPACT × PROBABILITY FACTORS

[E] Pork/beef import cost escalation — impact 5, probability 4, rating 20
RMB appreciation driving wet market prices +18% YoY. Direct threat to 28% food cost advantage. Mitigation: fixed-price 6-month contract with existing butcher.

[S] Ageing F&B kitchen workforce — impact 4, probability 5, rating 20
Average HK kitchen worker age is 52. Senior cook succession is a 6-month time horizon risk. No pipeline = no expansion.

[T] HACCP compliance documentation — impact 4, probability 4, rating 16
FEHD surprise inspections up 23%. Undocumented kitchen = compliance risk at current site AND blocker for any new Food Business Licence application.

[E] MPF employer contributions — impact 3, probability 5, rating 15
Each new hire adds 5% MPF obligation. 2 new stores = ~6 new kitchen staff = HKD 48,000/year additional obligation.

TOP OPPORTUNITIES
1. MTR residential vacancy window — 6.2% in Wong Tai Sin/Kwun Tong (act within 12 months)
2. Cashless transition — eliminating cash infrastructure reduces queue time ~11% and till error costs`,
   hitl:'HACCP compliance risk is now my top priority — more urgent than the expansion itself. I will engage a food safety consultant in Month 1 regardless of expansion timeline. The MPF cost for 6 new staff is manageable within the HKD 1.2M budget — already factored into the roadmap model.'},

  {id:'2.2',name:"Porter's Five Forces (HK QSR)",fw:"Porter's Five Forces",ac:AC.bl,stage:'Stage 2 — External Environmental Scan',stageAc:AC.bl,
   pivotQ:'Which 2 forces pose the greatest threat to 麵王 specifically?',
   scoreTag:'Consistency_Score',
   output:`INDUSTRY_ATTRACTIVENESS_SCORE: 3.1/5 | CONSISTENCY_SCORE: 0.88

FORCE ANALYSIS

Supplier Power — HIGH (4/5)
Single wet market source and 6-year butcher relationship create reliability but zero cost leverage. No alternative qualified supplier identified. Pork/beef at spot market price.

Threat of Substitutes — HIGH (4/5)
7-Eleven hot noodles at HKD 28, Circle K congee at HKD 22 directly compete for HKD 40-60 lunch bracket in residential estates. Cooked food centres in Wong Tai Sin and Kwun Tong at near-identical price points.

Competitive Rivalry — MEDIUM (3/5)
Mak's Noodle and Tsui Wah compete on heritage but at HKD 80-140 price points — different customer. Local cha chaan tengs are the real competitive set but lack the recipe heritage.

Buyer Power — MEDIUM (3/5)
OpenRice and Google Maps reviews are decisive for first visits. 麵王 has zero reviews outside Sham Shui Po — a cold-start problem for new sites.

Threat of New Entrants — LOW (2/5)
Food Business Licence, high kitchen fit-out cost, and MTR landlord concentration create meaningful barriers.

SELF-EVALUATION: Supplier power and substitution threat are most uncertain — local conditions in Wong Tai Sin may differ.`,
   hitl:'Agree that supplier power and substitution threat are the two forces requiring immediate action. The cold-start review problem for new sites is something I had not quantified — will seed OpenRice profiles for both target sites 3 months before opening. Engaging a second butcher supplier as a price reference in Month 2.'},

  {id:'3.1',name:'VRIO Analysis (Company Specific)',fw:'VRIO Framework',ac:AC.or,stage:'Stage 3 — Internal Capability Assessment',stageAc:AC.or,
   pivotQ:'Which VRIO resources are genuinely sustainable beyond 18 months? Flag any with imitability window < 18 months.',
   scoreTag:'Competitive_Advantage_Score',
   output:`COMPETITIVE_ADVANTAGE_SCORE: 0.43 | COMPLETENESS_SCORE: 1.0

SUSTAINED COMPETITIVE ADVANTAGE
• Grandmother's wonton skin recipe — Valuable: Yes (taste differentiation). Rare: Yes (no documented equivalent in HK). Inimitable: 36+ months (tacit knowledge, muscle memory). Organised: PARTIALLY — recipe exists only in owner's and senior cook's memory. URGENT FLAG.
• 8-minute table turnover — Valuable: Yes (throughput advantage). Rare: Yes (competitors average 14 min). Inimitable: 18 months (requires kitchen discipline culture). Organised: PARTIALLY — no written kitchen SOP.

TEMPORARY COMPETITIVE ADVANTAGE (imitability < 18 months — FLAGGED)
• 6-year butcher relationship — Valuable: Yes. Rare: Partly. Inimitable: 12 months (competitor can build similar relationship). ACTION: formalise as fixed-price contract.
• Owner's wet market sourcing network — Valuable: Yes. Rare: Yes. Inimitable: 6 months. CRITICAL: not transferable to a site manager without codification.

COMPETITIVE PARITY
• Octopus POS terminal — standard infrastructure, zero differentiation
• Foodpanda merchant account — replicable by any competitor in 2 weeks`,
   hitl:'Confirmed. The recipe and 8-min turnover are the two genuine moats. The senior cook succession risk is the most urgent strategic item. Have identified a candidate for the apprenticeship from my extended family network — will approach them this week. Owner sourcing network codification is being added to the SOP document as a separate chapter.'},

  {id:'3.2',name:'Value Chain Analysis (Company Specific)',fw:"Porter's Value Chain",ac:AC.or,stage:'Stage 3 — Internal Capability Assessment',stageAc:AC.or,
   pivotQ:'Where are the bottlenecks that will break first during expansion?',
   scoreTag:'Overall_Efficiency_Score',
   output:`OVERALL_EFFICIENCY_SCORE: 3.2/5 | INTERDEPENDENCY_SCORE: 0.83

TOP SCALE-UP BOTTLENECKS

1. HRM → Operations cascade
No written SOP means every new hire starts from zero. Owner-led 3-day verbal training cannot be replicated at a 3rd location. BOTTLENECK: hiring a second cook who can replicate wonton technique without owner present.

2. Inbound Logistics → Procurement cascade
Owner's personal wet market relationships are the procurement function. These are not documented or transferable. A Wong Tai Sin store manager cannot source correctly without the owner's daily presence.

3. Technology → Marketing & Sales cascade
Zero digital presence means no brand carry to new districts. The HKD 8,500 daily sales baseline was built over years of word-of-mouth in Sham Shui Po. Wong Tai Sin starts at zero.

INTERDEPENDENCIES
SOP documentation → enables HRM training → enables Operations replication
Butcher contract formalisation → reduces Procurement volatility → protects food cost margin
OpenRice profile seeding → drives initial Marketing & Sales → enables revenue ramp at Site 1

TOP 3 SCALE-UP LEVERS
1. Complete kitchen SOP with video (Month 3)
2. Train second cook to 90% recipe accuracy (Month 5)
3. Launch OpenRice + WhatsApp Business profiles (Month 6)`,
   hitl:'This confirms what I already felt but could not articulate: every weakness is the same root problem — the operation is inside my head. Committing to 4 hours every Monday for SOP documentation. Starting with wonton skin rolling technique on video this weekend.'},

  {id:'4.1',name:'SWOT Synthesis & Key Strategic Issues',fw:'SWOT / TOWS Matrix',ac:AC.pu,stage:'Stage 4 — Strategic Options Generation',stageAc:AC.pu,
   pivotQ:'What is the single most critical issue the CEO must resolve before choosing a growth path?',
   scoreTag:'Synthesis_Clarity_Score',
   output:`SYNTHESIS_CLARITY_SCORE: 0.91

TOP STRATEGIC ISSUE: Zero written SOPs make replication of the core value proposition — the wonton recipe and 8-minute turnover — structurally impossible at this time. No expansion decision should be made until this is resolved.

TOWS HIGHLIGHTS

SO (Strengths × Opportunities)
1. Deploy recipe heritage as in-store storytelling at MTR residential sites — zero cost, creates brand memory against cooked food centre substitutes
2. Lock in Wong Tai Sin ground floor lease during 6.2% vacancy window using proven Sham Shui Po unit economics as financial proof

ST (Strengths × Threats)
1. Formalise butcher supplier as 6-month fixed-price contract to protect 28% food cost against pork/beef escalation
2. Seed OpenRice reviews 3 months pre-opening to neutralise cold-start buyer power disadvantage

WT (Weaknesses × Threats)

function buildSidebar(){
  const sb=document.getElementById('sidebar');
  let html='';
  let lastStage='';
  AGENTS.forEach(ag=>{
    if(ag.stage!==lastStage){
      const stageColor=ag.stageAc;
      html+=`<div class="stage-hd" style="color:${stageColor};border-color:${stageColor}">${ag.stage}</div>`;
      lastStage=ag.stage;
    }
    const isActive=ag.id===activeAgentId;
    const doneStyle=`background:${ag.ac};border-color:${ag.ac};color:#fff`;
    const tagsBg=`background:${ag.ac}18;color:${ag.ac}`;
    const extraTags=(ag.isPivot?`<span class="tag" style="background:#f3eeff;color:#6d28d9">⚡ Pivot</span>`:'')+(ag.isLast?`<span class="tag" style="background:#e8f0f8;color:#1a3a5c">Final</span>`:'');
    html+=`<div class="ag${isActive?' active':' done'}" style="${isActive?`--active-ac:${ag.ac}`:''}" onclick="selectAgent('${ag.id}')">
      <div class="ag-av" style="${doneStyle}">✓</div>
      <div style="flex:1;min-width:0">
        <div class="ag-name" style="${isActive?'font-weight:500':''}"> ${ag.name}</div>
        <div class="ag-tags">
          <span class="tag" style="${tagsBg}">${ag.fw}</span>
          <span class="tag" style="background:#eaf5f0;color:#00a060">HITL ✓</span>
          ${extraTags}
        </div>
      </div>
      <button class="ag-run" style="background:${ag.ac}18;color:${ag.ac}">Re-run</button>
    </div>`;
  });
  html+=`<div class="sb-cta">
    <div class="sb-cta-lbl">Strategy Complete</div>
    <div class="sb-cta-body">All 13 agents reviewed. Your 15-slide presentation is ready.</div>
    <button class="sb-cta-btn" onclick="switchMode('pres')"><span class="play"></span>Open Presentation</button>
  </div>`;
  sb.innerHTML=html;
}

        <span class="hitl-done">Reviewed ✓</span>

    </div>
    ${pivotHtml}
    ${unlockHtml}
  </div>`;

function selectAgent(id){

}

];

let pcur=0;let notesShown=false;

function buildPresRail(){
  document.getElementById('pres-rail').innerHTML=SLIDES.map((s,i)=>{
    const on=i===pcur;
    return`<div class="pthumb${on?' on':''}" style="--thumb-ac:${s.ac}" onclick="pgo_abs(${i})">
      <div class="pthumb-n">${String(i+1).padStart(2,'0')}</div>
      <div class="pthumb-l">${s.label}</div>
    </div>`;
  }).join('');
}

function buildSlide(){
  const s=SLIDES[pcur];const ac=s.ac;
  const canvas=document.getElementById('pres-canvas');
  let html='';

  if(s.type==='title'){
    html=`<div class="slide" style="background:linear-gradient(135deg,${h2r(ac,0.07)} 0%,#fff 100%);border-color:${h2r(ac,0.2)};padding:38px 48px;min-height:264px;display:flex;flex-direction:column;justify-content:flex-end;position:relative;overflow:hidden">
      <div style="position:absolute;top:-44px;right:-44px;width:160px;height:160px;border-radius:50%;background:${h2r(ac,0.05)};border:1px solid ${h2r(ac,0.09)}"></div>
      <div style="position:absolute;top:14px;right:48px;font-size:8px;color:#bbb;letter-spacing:2px;text-transform:uppercase">MGMT5410 · Group 13 · HKUST</div>

      <div style="font-size:8px;letter-spacing:3px;color:${ac};text-transform:uppercase;font-weight:600;margin-bottom:8px">QSR Strategic Expansion · Hong Kong · 2025</div>
      <div style="font-family:'DM Serif Display',serif;font-size:34px;color:#1a1a1a;line-height:1.08;margin-bottom:10px">${s.title}</div>
      <div style="font-size:12px;color:#666;line-height:1.55;max-width:440px">${s.subtitle}</div>
      <div style="margin-top:24px;padding-top:12px;border-top:1px solid #e8e5e0;font-size:8px;color:#bbb;letter-spacing:1px;display:flex;gap:16px"><span>13 Agent AI Chain</span><span>·</span><span>15 Slides</span><span>·</span><span>Conservative Expansion Plan</span></div>
    </div>`;
  } else if(s.type==='swot'&&s.swotData){
    const Q=[{k:'strengths',l:'Strengths',c:'#00a060',bg:h2r('#00a060',0.06),bc:h2r('#00a060',0.17)},{k:'weaknesses',l:'Weaknesses',c:'#c97c10',bg:h2r('#c97c10',0.06),bc:h2r('#c97c10',0.17)},{k:'opportunities',l:'Opportunities',c:'#1a3a5c',bg:h2r('#1a3a5c',0.05),bc:h2r('#1a3a5c',0.14)},{k:'threats',l:'Threats',c:'#9b2335',bg:h2r('#9b2335',0.05),bc:h2r('#9b2335',0.13)}];
    html=`<div class="slide" style="padding:24px 30px;min-height:264px">
      <div style="font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:${ac};font-weight:700;margin-bottom:5px">${s.label}</div>
      <div style="font-family:'DM Serif Display',serif;font-size:20px;color:#1a1a1a">SWOT Matrix</div>
      <div style="width:28px;height:2px;background:${ac};border-radius:1px;margin-top:8px;margin-bottom:14px"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${Q.map(({k,l,c,bg,bc})=>`
        <div style="background:${bg};border:1px solid ${bc};border-radius:7px;padding:10px 12px">
          <div style="font-size:7px;letter-spacing:2px;text-transform:uppercase;color:${c};font-weight:700;margin-bottom:7px">${l}</div>
          ${(s.swotData[k]||[]).map(it=>`<div style="display:flex;gap:5px;margin-bottom:4px;align-items:flex-start"><div style="width:3px;height:3px;border-radius:50%;background:${c};margin-top:4px;flex-shrink:0"></div><div style="font-size:10px;color:#333;line-height:1.4">${it}</div></div>`).join('')}
        </div>`).join('')}
      </div>
    </div>`;
  } else if(s.type==='roadmap'&&s.phases){
    html=`<div class="slide" style="padding:24px 30px;min-height:264px">
      <div style="font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:${ac};font-weight:700;margin-bottom:5px">${s.label}</div>
      <div style="font-family:'DM Serif Display',serif;font-size:20px;color:#1a1a1a">Implementation Roadmap</div>
      <div style="width:28px;height:2px;background:${ac};border-radius:1px;margin-top:8px;margin-bottom:16px"></div>
      <div style="display:flex;gap:14px;position:relative">
        <div style="position:absolute;top:7px;left:7px;right:7px;height:2px;background:linear-gradient(90deg,${ac},${h2r(ac,0.25)});z-index:0"></div>
        ${s.phases.map((ph,i)=>`<div style="flex:1;position:relative;z-index:1">
          <div style="width:13px;height:13px;border-radius:50%;background:${i===0?ac:h2r(ac,0.4)};border:2px solid #f5f4f0;margin-bottom:8px"></div>
          <div style="font-size:7px;letter-spacing:2px;text-transform:uppercase;color:${ac};font-weight:700;margin-bottom:2px">${ph.name}</div>
          <div style="font-size:9px;color:#888;margin-bottom:7px">${ph.timeline}</div>
          ${ph.items.map(it=>`<div style="display:flex;gap:5px;margin-bottom:5px;align-items:flex-start"><div style="width:3px;height:3px;border-radius:50%;background:#bbb;margin-top:3px;flex-shrink:0"></div><div style="font-size:10px;color:#444;line-height:1.4">${it}</div></div>`).join('')}
        </div>`).join('')}
      </div>
    </div>`;
  } else if(s.type==='closing'){
    html=`<div class="slide" style="background:linear-gradient(135deg,${h2r(ac,0.07)} 0%,#fff 100%);border-color:${h2r(ac,0.18)};padding:36px 44px;min-height:264px;display:flex;flex-direction:column;justify-content:center">
      <div style="font-size:8px;letter-spacing:3px;text-transform:uppercase;color:${ac};font-weight:600;margin-bottom:9px">Strategic Recommendation</div>
      <div style="font-family:'DM Serif Display',serif;font-size:24px;color:#1a1a1a;line-height:1.2;margin-bottom:16px;max-width:480px">${s.headline}</div>
      ${(s.bullets||[]).map((b,i)=>`<div style="display:flex;gap:10px;margin-bottom:9px;align-items:flex-start">
        <div style="width:18px;height:18px;border-radius:4px;background:${h2r(ac,0.1)};border:1px solid ${h2r(ac,0.2)};display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <div style="font-size:9px;color:${ac};font-weight:700">${i+1}</div>
        </div>
        <div style="font-size:11px;color:#333;line-height:1.6">${b}</div>
      </div>`).join('')}
      ${s.cta?`<div style="padding-top:12px;border-top:1px solid #e8e5e0;margin-top:10px">
        <div style="font-size:8px;letter-spacing:2px;text-transform:uppercase;color:#888;margin-bottom:4px">First action this week</div>
        <div style="font-size:12px;color:${ac};font-weight:500">${s.cta}</div>
      </div>`:''}
    </div>`;
  } else {
    html=`<div class="slide" style="padding:24px 30px;min-height:264px">
      <div style="font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:${ac};font-weight:700;margin-bottom:5px">${s.label}</div>
      <div style="font-family:'DM Serif Display',serif;font-size:20px;color:#1a1a1a">${s.label}</div>
      <div style="width:28px;height:2px;background:${ac};border-radius:1px;margin-top:8px;margin-bottom:14px"></div>
      ${(s.bullets||[]).map((b,i)=>`<div style="display:flex;gap:10px;margin-bottom:9px;align-items:flex-start">
        <div style="width:18px;height:18px;border-radius:4px;background:${h2r(ac,0.08)};border:1px solid ${h2r(ac,0.18)};display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <div style="font-size:9px;color:${ac};font-weight:700">${i+1}</div>
        </div>
        <div style="font-size:11px;color:#333;line-height:1.6">${b}</div>
      </div>`).join('')}
      ${s.insight?`<div style="background:${h2r(ac,0.06)};border:1px solid ${h2r(ac,0.17)};border-radius:7px;padding:9px 12px;margin-top:10px">
        <div style="font-size:7px;letter-spacing:2px;text-transform:uppercase;color:${ac};font-weight:700;margin-bottom:3px">Key insight</div>
        <div style="font-size:11px;color:#444;line-height:1.55;font-style:italic">${s.insight}</div>
      </div>`:''}
    </div>`;
  }
  canvas.innerHTML=html;
}

function buildPresProgress(){
  const pct=SLIDES.length>1?Math.round((pcur/(SLIDES.length-1))*100):0;
  const ac=SLIDES[pcur].ac;
  document.getElementById('ppbar').style.width=pct+'%';
  document.getElementById('ppbar').style.background=ac;
  document.getElementById('pcounter').textContent=`${pcur+1} / ${SLIDES.length}`;
  const pb=document.getElementById('pprev');
  const pn=document.getElementById('pnext');
  pb.style.opacity=pcur===0?'0.4':'1';
  const last=pcur===SLIDES.length-1;
  pn.style.background=last?'#ddd':ac;
  pn.style.color=last?'#aaa':'#fff';
  pn.style.cursor=last?'not-allowed':'pointer';
  if(notesShown){document.getElementById('notes-txt').textContent=SLIDES[pcur].notes||'';}
  document.querySelector('.pres-rail').querySelectorAll('.pthumb').forEach((t,i)=>{
    t.classList.toggle('on',i===pcur);
    t.style.setProperty('--thumb-ac',SLIDES[i].ac);
  });
  const activeThumb=document.querySelector('.pres-rail').querySelectorAll('.pthumb')[pcur];
  if(activeThumb) activeThumb.scrollIntoView({block:'nearest'});
}

function pgo(dir){pcur=Math.max(0,Math.min(SLIDES.length-1,pcur+dir));buildSlide();buildPresProgress();}
function pgo_abs(i){pcur=i;buildSlide();buildPresProgress();}
function toggleNotes(){
  notesShown=!notesShown;
  const panel=document.getElementById('pres-notes');
  panel.style.display=notesShown?'block':'none';
  document.getElementById('notesToggle').style.background=notesShown?'var(--bg)':'transparent';
  if(notesShown)document.getElementById('notes-txt').textContent=SLIDES[pcur].notes||'';
}

document.addEventListener('keydown',e=>{
  const presOn=document.getElementById('pres-view').classList.contains('on');
  if(!presOn)return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown')pgo(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')pgo(-1);
});

buildPresRail();
buildSlide();
buildPresProgress();
</script>
